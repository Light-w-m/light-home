<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #f5f7fb;
        background: #111827;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .meta {
        margin-top: 10px;
        color: rgba(245, 247, 251, 0.72);
        font-size: 0.95rem;
      }

      .back {
        color: #f5f7fb;
        text-decoration: none;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .gallery {
        columns: 4 220px;
        column-gap: 14px;
      }

      .item {
        display: block;
        break-inside: avoid;
        margin: 0 0 14px;
        overflow: hidden;
        color: inherit;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.07);
      }

      .item img {
        display: block;
        width: 100%;
        height: auto;
      }

      .caption {
        padding: 9px 10px 10px;
        color: rgba(245, 247, 251, 0.78);
        font-size: 0.82rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>Photo</h1>
          <div class="meta">8 张图片</div>
        </div>
        <a class="back" href="/">返回主页</a>
      </header>

      <section class="gallery">
        <a class="item" href="/img/resources/photo/image.jpg" target="_blank">
          <img src="/img/resources/photo/image.jpg" alt="image.jpg" loading="lazy" />
          <div class="caption">海洋女孩.jpg</div>
        </a>
        <a class="item" href="/img/resources/photo/pVGli59.jpg" target="_blank">
          <img src="/img/resources/photo/pVGli59.jpg" alt="pVGli59.jpg" loading="lazy" />
          <div class="caption">云鲸.jpg</div>
        </a>
        <a class="item" href="/img/resources/photo/Violet%20Evergarden.png" target="_blank">
          <img src="/img/resources/photo/Violet%20Evergarden.png" alt="Violet Evergarden.png" loading="lazy" />
          <div class="caption">Violet Evergarden.png</div>
        </a>
        <a class="item" href="/img/resources/photo/%E5%88%9D%E9%9F%B3%20.png" target="_blank">
          <img src="/img/resources/photo/%E5%88%9D%E9%9F%B3%20.png" alt="初音 .png" loading="lazy" />
          <div class="caption">初音 .png</div>
        </a>
        <a class="item" href="/img/resources/photo/%E5%B0%91%E5%A5%B3.jpg" target="_blank">
          <img src="/img/resources/photo/%E5%B0%91%E5%A5%B3.jpg" alt="少女.jpg" loading="lazy" />
          <div class="caption">少女.jpg</div>
        </a>
        <a class="item" href="/img/resources/photo/%E7%BB%98%E6%A2%A8%E8%A1%A3.jpg" target="_blank">
          <img src="/img/resources/photo/%E7%BB%98%E6%A2%A8%E8%A1%A3.jpg" alt="绘梨衣.jpg" loading="lazy" />
          <div class="caption">绘梨衣.jpg</div>
        </a>
        <a class="item" href="/img/resources/photo/%E8%8E%89%E5%A5%88%E5%A8%85.jpg" target="_blank">
          <img src="/img/resources/photo/%E8%8E%89%E5%A5%88%E5%A8%85.jpg" alt="莉奈娅.jpg" loading="lazy" />
          <div class="caption">莉奈娅.jpg</div>
        </a>
        <a class="item" href="/img/resources/photo/%E9%A3%8E%E6%99%AF.jpg" target="_blank">
          <img src="/img/resources/photo/%E9%A3%8E%E6%99%AF.jpg" alt="风景.jpg" loading="lazy" />
          <div class="caption">风景.jpg</div>
        </a>
      </section>
    </main>
  </body>
</html>
